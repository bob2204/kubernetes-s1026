---
name: keycloak

services:
  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_IMAGE_TAG}
    container_name: keycloak
    command: start-dev --https-certificate-file=/etc/x509/https/tls.crt --https-certificate-key-file=/etc/x509/https/tls.key --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_FRONTEND_URL: https://auth.stage.local:8443/
      KC_HOSTNAME: auth.stage.local
      KC_FEATURES: scripts,preview
    ports:
      - "8443:8443"
    volumes:
    - "$PWD/certs/auth.local.key:/etc/x509/https/tls.key"
    - "$PWD/certs/auth.local.crt:/etc/x509/https/tls.crt"
    - "data:/opt/keycloak/data"
    restart: unless-stopped

volumes:
  data:  
