apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hello
  name: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - image: bob2606/hello-http:0.8.39
        name: hello-http
        envFrom:
        - configMapRef:
            name: hello
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 30m
