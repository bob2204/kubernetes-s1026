apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: www
  name: www
spec:
  replicas: 1
  selector:
    matchLabels:
      app: www
  template:
    metadata:
      labels:
        app: www
    spec:
      containers:
      - image: nginx:1.28
        name: nginx
        ports:
          - name: http
            containerPort: 80
        env:
          - name: STAGE
            value: K8S
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: DAYS
            valueFrom:
              configMapKeyRef:
                name: www
                key: JOURS
